version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: jsm_app
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - TZ=Asia/Kolkata
    depends_on:
      - postgres

  postgres:
    image: postgres:14
    container_name: jsm_postgres
    environment:
      POSTGRES_DB: jsm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Kolkata
    ports:
      - "5433:5432"