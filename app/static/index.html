<!DOCTYPE html>

<html>
<head>
    <title>JSM Report</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        select, input { width: 300px; margin-bottom: 10px; }
        .box { margin-bottom: 20px; }
        .fields {
            height: 200px;
            overflow-y: scroll;
            border: 1px solid #ccc;
            padding: 10px;
        }
        button { padding: 10px 20px; margin-right: 10px; cursor: pointer; }
    </style>
</head>
<body>

<h2>JSM Report Generator</h2>

<div class="box">
    <label>Project</label><br>
    <select id="project" multiple></select>
</div>

<div class="box">
    <label>Status</label><br>
    <select id="status" multiple></select>
</div>

<div class="box">
    <label>Issue Type</label><br>
    <select id="issuetype" multiple></select>
</div>

<div class="box">
    <label>Range (Days)</label><br>
    <input type="number" id="range" placeholder="e.g. 7">
</div>

<div class="box">
    <label>OR Start Date</label><br>
    <input type="date" id="start_date">
</div>

<div class="box">
    <label>End Date</label><br>
    <input type="date" id="end_date">
</div>

<div class="box">
    <label>Select Fields (Order matters)</label><br>

    <input type="text" id="fieldSearch" placeholder="Search fields..." onkeyup="filterFields()">

    <div style="display:flex; gap:20px;">

        <!-- Available -->
        <div>
            <h4>Available</h4>
            <select id="availableFields" size="10" style="width:300px;"></select>
        </div>

        <!-- Buttons -->
        <div style="display:flex; flex-direction:column; justify-content:center;">
            <button onclick="addField()"> &gt;&gt; </button>
            <button onclick="removeField()"> &lt;&lt; </button>
            <button onclick="moveUp()"> ↑ </button>
            <button onclick="moveDown()"> ↓ </button>
        </div>

        <!-- Selected -->
        <div>
            <h4>Selected (Order)</h4>
            <select id="selectedFields" size="10" style="width:300px;"></select>
        </div>

    </div>
</div>

<br>

<button onclick="downloadReport()">Download Excel</button>

<script>

async function loadData() {
    try {
        const [projects, status, issuetype, fields] = await Promise.all([
            fetch('/jira/projects').then(r => r.json()),
            fetch('/jira/status').then(r => r.json()),
            fetch('/jira/issuetypes').then(r => r.json()),
            fetch('/jira/fields').then(r => r.json())
        ]);

        fillSelect("project", projects, "key", "name");
        fillSelect("status", status, "name", "name");
        fillSelect("issuetype", issuetype, "name", "name");

        const available = document.getElementById("availableFields");

        fields.forEach(f => {
            const opt = document.createElement("option");
            opt.value = f.id;
            opt.text = f.name;
            available.appendChild(opt);
        });

        const selected = document.getElementById("selectedFields");

        // Default fields (you can customize)
        ["summary", "created"].forEach(id => {
            const opt = Array.from(available.options).find(o => o.value === id);
            if (opt) {
                selected.appendChild(opt.cloneNode(true));
            }
        });

    } catch (err) {
        alert("Error loading data");
        console.error(err);
    }
}

function fillSelect(id, data, valueKey, textKey) {
    const select = document.getElementById(id);
    data.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item[valueKey];
        opt.text = item[textKey];
        select.appendChild(opt);
    });
}

function getSelected(id) {
    return Array.from(document.getElementById(id).selectedOptions)
        .map(o => o.value);
}

function filterFields() {
    const search = document.getElementById("fieldSearch").value.toLowerCase();
    const options = document.getElementById("availableFields").options;

    for (let i = 0; i < options.length; i++) {
        const txt = options[i].text.toLowerCase();
        options[i].style.display = txt.includes(search) ? "" : "none";
    }
}

async function downloadReport() {
    const body = {
        filters: {
            project: getSelected("project"),
            status: getSelected("status"),
            issuetype: getSelected("issuetype"),
            range: document.getElementById("range").value || null,
            start_date: document.getElementById("start_date").value || null,
            end_date: document.getElementById("end_date").value || null
        },
        fields: getFields()
    };

    try {
        const response = await fetch('/jira/download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (!response.ok) {
            throw new Error("Download failed");
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "jira_report.xlsx";
        a.click();

    } catch (err) {
        alert("Error generating report");
        console.error(err);
    }
}

function addField() {
    const available = document.getElementById("availableFields");
    const selected = document.getElementById("selectedFields");

    Array.from(available.selectedOptions).forEach(opt => {

        // prevent duplicates
        const exists = Array.from(selected.options).some(o => o.value === opt.value);
        if (!exists) {
            selected.appendChild(opt.cloneNode(true));
        }

    });
}

function removeField() {
    const selected = document.getElementById("selectedFields");

    Array.from(selected.selectedOptions).forEach(opt => {
        opt.remove();
    });
}

function moveUp() {
    const selected = document.getElementById("selectedFields");

    for (let i = 1; i < selected.options.length; i++) {
        if (selected.options[i].selected) {
            selected.insertBefore(selected.options[i], selected.options[i - 1]);
        }
    }
}

function moveDown() {
    const selected = document.getElementById("selectedFields");

    for (let i = selected.options.length - 2; i >= 0; i--) {
        if (selected.options[i].selected) {
            selected.insertBefore(selected.options[i + 1], selected.options[i]);
        }
    }
}

function getFields() {
    return Array.from(document.getElementById("selectedFields").options)
        .map(o => o.value);
}

loadData();

</script>

</body>
</html>
